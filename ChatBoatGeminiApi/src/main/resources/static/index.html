<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .chat-container{
            width:400px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        #chat-box{
            height:350px;
            overflow-y:auto;
            border:1px solid #ccc;
            padding:10px;
            margin-bottom:10px;
        }

        .user{
            color:blue;
            margin-bottom:10px;
        }

        .bot{
            color:green;
            margin-bottom:10px;
        }

        .input-area{
            display:flex;
        }

        input{
            flex:1;
            padding:10px;
        }

        button{
            padding:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="chat-container">

    <h2>Gemini AI Chatbot</h2>

    <div id="chat-box"></div>

    <div class="input-area">

        <input type="text"
               id="message"
               placeholder="Type message...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

    async function sendMessage(){

        let input = document.getElementById("message");

        let message = input.value;

        if(message.trim()===""){
            return;
        }

        let chatBox = document.getElementById("chat-box");

        chatBox.innerHTML +=
            `<div class="user"><b>You:</b> ${message}</div>`;

        input.value="";

        let response = await fetch("/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:message
            })

        });

        let data = await response.text();

        chatBox.innerHTML +=
            `<div class="bot"><b>Bot:</b> ${data}</div>`;

        chatBox.scrollTop = chatBox.scrollHeight;
    }

</script>

</body>
</html>
